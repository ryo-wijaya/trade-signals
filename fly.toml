# fly.toml app configuration file generated for trade-signals on 2026-06-14T15:08:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trade-signals'
primary_region = 'sin'

[build]

[env]
  CONFIG_DIR = '/data'

[[mounts]]
  source = 'trade_signals_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
